<!doctype html>
<html lang="en">
  <head>
    <script>
      // Workaround for environments where window.fetch is a getter-only and third-party scripts try to assign to it
      try {
        let currentFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: function() { return currentFetch; },
          set: function(v) {
            console.warn('Ignored attempt to overwrite window.fetch');
          },
          configurable: true,
          enumerable: true
        });
      } catch(e) {}
    </script>

  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
